# Power-of-Two Choices routing
#
# On each request, picks 2 workers at random and forwards to the least loaded.
# Much better than random at avoiding hot-spots, with minimal overhead.
# Best when workers have variable load (requests of different duration).
#
# Requires workers to report their load via /get_server_info.
#
# Start:
#   cargo run -- --config-file configs/power-of-two.yaml

host: "0.0.0.0"
port: 3000
log_level: info

# Optional: protect /admin/* endpoints with a static API key.
# admin_api_key: "my-secret-admin-key"

mode:
  type: regular
  worker_urls:
    - "http://localhost:8010"
    - "http://localhost:8020"

policy:
  type: power_of_two
  # How often (in seconds) to poll each worker's load.
  # Lower = more up-to-date but more monitoring traffic.
  # Higher = less overhead but less precise decisions.
  load_check_interval_secs: 10

# Prometheus metrics endpoint (default: 127.0.0.1:29000)
metrics:
  host: "0.0.0.0"
  port: 29000

# Health checks for backend workers
health_check:
  check_interval_secs: 60
  timeout_secs: 5
  failure_threshold: 3
  success_threshold: 2
  endpoint: /health

# ---------------------------------------------------------------------------
# Optional features (see docs/configuration.md for details)
# ---------------------------------------------------------------------------

# Routing decision headers on every response (default: true)
# expose_routing_headers: true

# Model name rewriting (alias external names to local models)
# model_rules:
#   - match: "gpt-4"
#     rewrite: "my-local-model"

# Pre-routing hooks (safety, PII, custom validation via HTTP callouts)
# pre_routing_hooks:
#   - name: "content-safety"
#     url: "http://localhost:9001/check"
#     timeout_ms: 200
#     on_error: pass

# Decision log export (for `vllm-router replay`)
# decision_log:
#   export_path: "/var/log/vllm-router/decisions.jsonl"
#   export_interval_secs: 10

# OpenTelemetry distributed tracing (default: disabled)
# trace_config:
#   otlp_traces_endpoint: "localhost:4317"
#   sampling_ratio: 1.0
