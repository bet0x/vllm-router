# Round-Robin with Redis-backed response cache
#
# Same as round-robin.yaml but uses Redis for the response cache.
# Multiple router instances pointing to the same Redis share cached responses.
#
# Requires: cargo build --release --features redis-cache
#
# Start:
#   vllm-router --config-file configs/round-robin-redis-cache.yaml

host: "0.0.0.0"
port: 3000
log_level: info

# Optional: protect /admin/* endpoints with a static API key.
# admin_api_key: "my-secret-admin-key"

mode:
  type: regular
  worker_urls:
    - "http://localhost:8010"
    - "http://localhost:8020"

policy:
  type: round_robin

# Prometheus metrics endpoint (default: 127.0.0.1:29000)
metrics:
  host: "0.0.0.0"
  port: 29000

# Health checks for backend workers
health_check:
  check_interval_secs: 60
  timeout_secs: 5
  failure_threshold: 3
  success_threshold: 2
  endpoint: /health

cache:
  backend: redis
  max_entries: 2048
  ttl_secs: 120
  redis:
    url: "redis://127.0.0.1:6379/0"
    pool_size: 8
    key_prefix: "vllm-router:"
    connection_timeout_ms: 3000
    command_timeout_ms: 500

# ---------------------------------------------------------------------------
# Optional features (see docs/configuration.md for details)
# ---------------------------------------------------------------------------

# Routing decision headers on every response (default: true)
# expose_routing_headers: true

# Model name rewriting (alias external names to local models)
# model_rules:
#   - match: "gpt-4"
#     rewrite: "my-local-model"

# Pre-routing hooks (safety, PII, custom validation via HTTP callouts)
# pre_routing_hooks:
#   - name: "content-safety"
#     url: "http://localhost:9001/check"
#     timeout_ms: 200
#     on_error: pass

# Decision log export (for `vllm-router replay`)
# decision_log:
#   export_path: "/var/log/vllm-router/decisions.jsonl"
#   export_interval_secs: 10

# OpenTelemetry distributed tracing (default: disabled)
# trace_config:
#   otlp_traces_endpoint: "localhost:4317"
#   sampling_ratio: 1.0
