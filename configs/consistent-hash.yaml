# Consistent Hash routing (session affinity)
#
# Requests from the same user/session always go to the same worker
# as long as it is healthy. On failure, falls over to the next in the ring.
#
# Session ID is extracted in priority order:
#   1. Header x-session-id
#   2. Header x-user-id
#   3. body.session_params.session_id
#   4. body.user
#   5. Hash of the full body (fallback, not sticky)
#
# Note: only "session:" and "user:" keys are pinned in the sticky map.
#       Requests without a session ID use body hash (not sticky).
#
# Start:
#   cargo run -- --config-file configs/consistent-hash.yaml
#
# Test session affinity:
#   curl http://localhost:3000/v1/chat/completions \
#     -H "Content-Type: application/json" \
#     -H "x-session-id: user-abc" \
#     -d '{"model":"RedHatAI/Llama-3.2-1B-Instruct-FP8",
#          "messages":[{"role":"user","content":"Hello"}]}'
#
#   # The same x-session-id always routes to the same worker
#   curl http://localhost:3000/v1/chat/completions \
#     -H "Content-Type: application/json" \
#     -H "x-session-id: user-abc" \
#     -d '{"model":"RedHatAI/Llama-3.2-1B-Instruct-FP8",
#          "messages":[{"role":"user","content":"Continue our conversation"}]}'

host: "0.0.0.0"
port: 3000
log_level: info

# Optional: protect /admin/* endpoints with a static API key.
# admin_api_key: "my-secret-admin-key"

mode:
  type: regular
  worker_urls:
    - "http://localhost:8010"
    - "http://localhost:8020"

policy:
  type: consistent_hash
  # Number of virtual nodes per worker in the hash ring.
  # More vnodes = more uniform distribution, but more memory.
  # Recommended: 100–200.
  virtual_nodes: 160

# Prometheus metrics endpoint (default: 127.0.0.1:29000)
metrics:
  host: "0.0.0.0"
  port: 29000

# Health checks for backend workers
health_check:
  check_interval_secs: 60
  timeout_secs: 5
  failure_threshold: 3
  success_threshold: 2
  endpoint: /health

# ---------------------------------------------------------------------------
# Optional features (see docs/configuration.md for details)
# ---------------------------------------------------------------------------

# Routing decision headers on every response (default: true)
# expose_routing_headers: true

# Model name rewriting (alias external names to local models)
# model_rules:
#   - match: "gpt-4"
#     rewrite: "my-local-model"

# Pre-routing hooks (safety, PII, custom validation via HTTP callouts)
# pre_routing_hooks:
#   - name: "content-safety"
#     url: "http://localhost:9001/check"
#     timeout_ms: 200
#     on_error: pass

# Decision log export (for `vllm-router replay`)
# decision_log:
#   export_path: "/var/log/vllm-router/decisions.jsonl"
#   export_interval_secs: 10

# OpenTelemetry distributed tracing (default: disabled)
# trace_config:
#   otlp_traces_endpoint: "localhost:4317"
#   sampling_ratio: 1.0

# Token ID cache for LMCache prefix lookup (default: disabled)
# prompt_cache:
#   backend: redis
#   ttl_secs: 3600

# Shared prefix routing table for multi-instance cache-aware (default: disabled)
# shared_prefix_routing:
#   prefix_chars: 256
#   ttl_secs: 300
#   write_probability: 0.1
#   backend: memory
