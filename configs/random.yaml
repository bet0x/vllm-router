# Random routing
#
# Picks a worker at random on each request.
# Statistically equivalent to round-robin under high load.
# Useful when you want to avoid strict ordering (e.g. burst traffic).
#
# Start:
#   cargo run -- --config-file configs/random.yaml

host: "0.0.0.0"
port: 3000
log_level: info

# Optional: protect /admin/* endpoints with a static API key.
# admin_api_key: "my-secret-admin-key"

mode:
  type: regular
  worker_urls:
    - "http://localhost:8010"
    - "http://localhost:8020"

policy:
  type: random

# Prometheus metrics endpoint (default: 127.0.0.1:29000)
metrics:
  host: "0.0.0.0"
  port: 29000

# Health checks for backend workers
health_check:
  check_interval_secs: 60
  timeout_secs: 5
  failure_threshold: 3
  success_threshold: 2
  endpoint: /health
