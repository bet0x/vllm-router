# Round-Robin routing
#
# Distributes requests in strict order across all healthy workers.
# Simple and predictable. Best when all workers are equivalent.
#
# Start:
#   cargo run -- --config-file configs/round-robin.yaml

host: "0.0.0.0"
port: 3000
log_level: info

# Optional: protect /admin/* endpoints with a static API key.
# admin_api_key: "my-secret-admin-key"

mode:
  type: regular
  worker_urls:
    - "http://localhost:8010"
    - "http://localhost:8020"

policy:
  type: round_robin
