name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler libprotobuf-dev libsentencepiece-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release

      - name: Package release tarball
        run: |
          TAG="${GITHUB_REF_NAME}"
          DIST="vllm-router-${TAG}-linux-amd64"
          mkdir -p "${DIST}"
          cp target/release/vllm-router "${DIST}/"
          cp -r configs/ "${DIST}/configs"
          cp -r docs/   "${DIST}/docs"
          cp -r scripts/ "${DIST}/scripts"
          cp README.md CHANGELOG.md "${DIST}/"
          tar czf "${DIST}.tar.gz" "${DIST}"
          echo "ASSET=${DIST}.tar.gz" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ${{ env.ASSET }}
