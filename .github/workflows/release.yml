name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler libprotobuf-dev libsentencepiece-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release

      - name: Package release tarball
        run: |
          TAG="${GITHUB_REF_NAME}"
          DIST="vllm-router-${TAG}-linux-amd64"
          mkdir -p "${DIST}"
          cp target/release/vllm-router "${DIST}/"
          cp -r configs/ "${DIST}/configs"
          cp -r docs/   "${DIST}/docs"
          cp -r scripts/ "${DIST}/scripts"
          cp README.md CHANGELOG.md "${DIST}/"
          tar czf "${DIST}.tar.gz" "${DIST}"
          echo "ASSET=${DIST}.tar.gz" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ${{ env.ASSET }}

  docker:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version tag
        id: meta
        run: echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.router
          push: true
          tags: |
            barrahome/vllm-router:${{ steps.meta.outputs.version }}
            barrahome/vllm-router:latest
            ghcr.io/bet0x/vllm-router:${{ steps.meta.outputs.version }}
            ghcr.io/bet0x/vllm-router:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
